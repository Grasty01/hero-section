<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Hero section</title>
  </head>
  <body>
    <header>
      <nav>
        <a class="logo" href="#">Portfolio</a>
        <ul class="links">
          <li><a href="#">Accueil</a></li>
          <li><a href="#">À propos</a></li>
          <li><a href="#">Projets</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="hero">
        <img src="img/profil.jpg" alt="Photo de profil de Grâsty Samba" />
        <div class="hero-infos">
          <p class="section-tag">Développeur web fullstack</p>
          <span class="separator"></span>
          <h1>
            Bonjour, je suis <br /><span>Grâsty Ghyvet SAMBA DINAULT</span>
          </h1>
          <p class="hero-description">
            Passionné par le web, je crée des interfaces modernes et des
            expériences utilisateur mémorables.
          </p>
          <div class="hero-links">
            <a href="#projects">Mes projets</a>
            <a href="#contact">Me contacter</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
